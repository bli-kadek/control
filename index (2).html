<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Control Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  margin-bottom: 20px;
}

input {
  padding: 10px;
  font-size: 16px;
  width: 150px;
  margin-right: 10px;
}

button {
  padding: 10px 15px;
  background: #3498db;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #2980b9;
}

.value-box {
  display: flex;
  gap: 30px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

  <!-- DISPLAY -->
  <div class="card">
    <h2>Realtime Control</h2>
    <div class="value-box">
      <div>PV: <span id="pv">0</span></div>
      <div>SP: <span id="sp">0</span></div>
      <div>Time: <span id="time">0</span></div>
    </div>
  </div>

  <!-- INPUT SETPOINT -->
  <div class="card">
    <h2>Set Setpoint (SP)</h2>
    <input type="number" id="inputSP" placeholder="Masukkan SP">
    <button onclick="updateSP()">Kirim</button>
  </div>

  <!-- GRAPH -->
  <div class="card">
    <h2>PV vs SP</h2>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

// ================= FIREBASE CONFIG =================
const firebaseConfig = {
  apiKey: "AIzaSyCvwLSVButCdf2wURfVCNgei60OsOch9UA",
  authDomain: "control-f2c8d.firebaseapp.com",
  databaseURL: "https://control-f2c8d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "control-f2c8d",
  storageBucket: "control-f2c8d.firebasestorage.app",
  messagingSenderId: "597550932985",
  appId: "1:597550932985:web:8a43d1cdc0d57fd87d1328"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
firebase.auth().signInAnonymously();

// ================= CHART =================
const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      {
        label: 'PV',
        data: [],
        borderColor: '#3498db',
        tension: 0.3
      },
      {
        label: 'SP',
        data: [],
        borderColor: '#e74c3c',
        borderDash: [5,5],
        tension: 0.3
      }
    ]
  },
  options: {
    responsive: true,
    animation: false
  }
});

// ================= UPDATE UI =================
function updateUI(pv, sp, time) {
  document.getElementById('pv').innerText = pv.toFixed(2);
  document.getElementById('sp').innerText = sp.toFixed(2);
  document.getElementById('time').innerText = new Date(time * 1000).toLocaleTimeString();
}

// ================= UPDATE GRAPH =================
function updateChart(time, pv, sp) {
  const label = new Date(time * 1000).toLocaleTimeString();

  chart.data.labels.push(label);
  chart.data.datasets[0].data.push(pv);
  chart.data.datasets[1].data.push(sp);

  if (chart.data.labels.length > 50) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[1].data.shift();
  }

  chart.update();
}

// ================= SETPOINT FUNCTION =================
function updateSP() {
  const sp = parseFloat(document.getElementById('inputSP').value);

  if (isNaN(sp)) {
    alert("Masukkan angka yang valid!");
    return;
  }

  db.ref('/SP').set(sp);
}

// ================= FIREBASE LISTENER =================
db.ref('/').on('value', snapshot => {
  const data = snapshot.val();

  if (!data) return;

  const pv = data.PV || 0;
  const sp = data.SP || 0;
  const time = data.time || Math.floor(Date.now()/1000);

  updateUI(pv, sp, time);
  updateChart(time, pv, sp);
});

</script>

</body>
</html>
